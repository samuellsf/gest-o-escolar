<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/style.css">
<h2 style="padding-top: 50px;">Preencher Formulário</h2>
</head>
<body class="fundo-pagina">

<form id="formulario">
    <label for="email">Email:</label>
    <input type="email" id="email" required>

    <label for="mensagens">Mensagens:</label>
    <div>
        <textarea id="mensagens" rows="4" readonly></textarea>
    <div class="botoes-mensagens">
        <button type="submit">Enviar</button>
        <button type="button" id="adicionarMensagem">Adicionar Mensagem</button>
        <button type="button" id="listarMensagens">Listar Mensagens</button>
        <button type="button" id="buscarMensagem">Buscar Mensagem</button>
        <button type="button" id="removerMensagem">Remover Mensagem</button>
    </div>
</form>


    <div>
<button id="voltar">Voltar</button>
<script>
    function voltarParaLobby() {
        window.location.href = "index.html"; 
    }
</script>
<button class="botao-lobby-redondo" onclick="voltarParaLobby()" title="Voltar ao Início">
    <img src="../assets/img/Lobby.webp" alt="Início" class="icone-lobby">
</button>
</div>


    <p>&copy; 2025 Gestão Escolar</p>
</body>
<script src="../js/formulario.js"></script>
<script>
    document.getElementById('voltar').addEventListener('click', function() {
        window.history.back();
    });
</script>
<script>
    document.getElementById('formulario').addEventListener('submit', function(event) {
        event.preventDefault(); 
        const email = document.getElementById('email').value;
        const mensagem = document.getElementById('mensagem').value;
        alert(`Formulário enviado!\nEmail: ${email}\nMensagem: ${mensagem}`);

       
        document.getElementById('formulario').reset();
    });
</script>
    
</body>
</html>

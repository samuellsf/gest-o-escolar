<h2>Preencher Formulário</h2>
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="fundo-pagina">

<form id="formulario">
    <label for="email">Email:</label>
    <input type="email" id="email" required>

    <label for="mensagem">Mensagem:</label>
    <h2><textarea id="mensagem" required></textarea></h2>

     <h2><button type="submit">Enviar</button></h2>
    <h2><button type="button" id="listarMensagens">Listar Mensagens</button></h2>
    <h2><button type="button" id="buscarMensagem">Buscar Mensagem</button></h2>
    <h2><button type="button" id="removerMensagem">Remover Mensagem</button></h2>

</form>
<body>
<button id="voltar">Voltar</button>
@<footer>
    <p>&copy; 2025 Gestão Escolar</p>
</body>
<script src="../js/formulario.js"></script>
<script>
    document.getElementById('voltar').addEventListener('click', function() {
        window.history.back();
    });
</script>
<script>
    document.getElementById('formulario').addEventListener('submit', function(event) {
        event.preventDefault(); // Impede o envio do formulário
        const email = document.getElementById('email').value;
        const mensagem = document.getElementById('mensagem').value;
        alert(`Formulário enviado!\nEmail: ${email}\nMensagem: ${mensagem}`);

        // Aqui você pode adicionar a lógica para enviar os dados do formulário para um servidor ou processá-los conforme necessário
        document.getElementById('formulario').reset(); // Limpa o formulário após o envio
    });
</script>
